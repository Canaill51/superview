name: Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests Before Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    
    - name: Run tests
      run: go test ./common -v
    
    - name: Run coverage check
      run: |
        go test ./common -coverprofile=coverage.out
        coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        if (( $(echo "$coverage < 30" | bc -l) )); then
          echo "❌ Coverage ${coverage}% below 30% gate"
          exit 1
        fi
        echo "✅ Coverage ${coverage}% passes gate"

  build-cli:
    name: Build CLI (Cross-Platform) with GoReleaser
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Select GoReleaser mode
      id: goreleaser-mode
      shell: bash
      run: |
        if [[ "${GITHUB_REF_NAME}" == v* ]]; then
          echo "args=release --clean --draft" >> "$GITHUB_OUTPUT"
        else
          echo "args=release --clean --draft --snapshot" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v4
      with:
        version: latest
        args: ${{ steps.goreleaser-mode.outputs.args }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload CLI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cli-artifacts
        path: dist/superview-*.{tar.gz,zip}

  build-gui-windows:
    name: Build GUI (Windows)
    needs: test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    
    - name: Build GUI (native arch)
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p build
        ARCH="$(go env GOARCH)"
        GOOS=windows GOARCH="$ARCH" go build -ldflags="-s -w -H=windowsgui" -o "build/superview-gui-windows-${ARCH}.exe" superview-gui.go
    
    - name: Create archives
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}"
        $arch = go env GOARCH
        switch ($arch) {
          "amd64" { $archLabel = "x86_64" }
          "386" { $archLabel = "i386" }
          "arm64" { $archLabel = "aarch64" }
          default { $archLabel = $arch }
        }
        Compress-Archive -Path "build/superview-gui-windows-$arch.exe" -DestinationPath "superview-gui-$version-windows-$archLabel.zip" -Force
    
    - name: Upload GUI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gui-windows-artifacts
        path: superview-gui-${{ github.ref_name }}-windows-*.zip

  create-release:
    name: Create GitHub Release
    needs: [build-cli, build-gui-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/release-')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: List all artifacts
      run: |
        echo "=== Release Artifacts ===" 
        find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort
    
    - name: Calculate checksums
      run: |
        find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read file; do
          sha256sum "$file"
        done > artifacts/checksums.txt
        echo "=== Checksums ===" && cat artifacts/checksums.txt
    
    - name: Create release summary
      run: |
        version="${GITHUB_REF_NAME}"
        echo "## Release ${version} - Superview" > /tmp/release.md
        echo "" >> /tmp/release.md
        echo "### CLI Binaries" >> /tmp/release.md
        echo "- Available as generated by GoReleaser artifacts" >> /tmp/release.md
        echo "" >> /tmp/release.md
        echo "### GUI Applications (Official Target)" >> /tmp/release.md
        echo "- Windows: native runner arch" >> /tmp/release.md
        echo "" >> /tmp/release.md
        echo "### Verify Integrity" >> /tmp/release.md
        echo "\`\`\`bash" >> /tmp/release.md
        echo "sha256sum -c checksums.txt" >> /tmp/release.md
        echo "\`\`\`" >> /tmp/release.md
        cat /tmp/release.md

    - name: Publish release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        draft: true
        prerelease: ${{ startsWith(github.ref, 'refs/tags/release-') }}
        body_path: /tmp/release.md
        files: |
          artifacts/**/*.tar.gz
          artifacts/**/*.zip
          artifacts/checksums.txt

  notify:
    name: Notify Release Status
    needs: [test, build-cli, build-gui-windows, create-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check release status
      run: |
        echo "✅ Release workflow completed"
        echo "  - Tests: PASSED"
        echo "  - CLI builds: COMPLETED"
        echo "  - GUI Windows: COMPLETED"
        echo ""
        echo "📦 Artifacts ready in: GitHub Release page"
        echo "📝 Next: Manual publish of draft release"
